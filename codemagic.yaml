
workflows:
  default:
    name: BossCash
    max_build_duration: 10
    instance_type: mac_mini_m1
    environment:
      flutter: stable
    scripts:
      - name: Forzar Estructura Android v2
        script: |
          rm -rf android
          flutter create . --platforms=android --overwrite
      - name: Compilar APK Real
        script: |
          flutter build apk --release
    artifacts:
      - build/app/outputs/flutter-apk/*.apk
