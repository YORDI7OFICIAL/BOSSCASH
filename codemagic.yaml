workflows:
  default:
    name: BossCash
    max_build_duration: 10
    instance_type: mac_mini_m1
    environment:
      flutter: stable
    scripts:
      - name: Crear estructura moderna
        script: |
          flutter create . --platforms=android --org com.bosscash
      - name: Compilar APK Real
        script: |
          flutter build apk --release
    artifacts:
      - build/app/outputs/flutter-apk/*.apk
